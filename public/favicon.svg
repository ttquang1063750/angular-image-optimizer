<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <style>
      :root {
        --color-primary: #c3002f;
        --color-info: #1890ff;
        --color-border: #dddddd;
        --color-warning: #faad14;
        --color-danger: #ff4d4f;
        --color-success: #52c41a;
        --color-text-faint: #bbbbbb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-primary: #ff5577;
          --color-info: #40a9ff;
          --color-border: #3a3f4a;
          --color-warning: #ffc53d;
          --color-danger: #ff7875;
          --color-success: #73d13d;
          --color-text-faint: #555962;
        }
      }
      .bg-grad-a {
        fill: url(#logo-grad-a);
      }
      .bg-grad-b {
        fill: url(#logo-grad-b);
      }
      .border-stroke {
        stroke: var(--color-border);
      }
      .color-primary {
        fill: var(--color-primary);
      }
      .stroke-primary {
        stroke: var(--color-primary);
      }
      .color-info {
        fill: var(--color-info);
      }
      .color-warning {
        fill: var(--color-warning);
      }
      .color-danger {
        fill: var(--color-danger);
      }
      .color-success {
        fill: var(--color-success);
      }
      .color-text-faint {
        fill: var(--color-text-faint);
      }
      .text-badge {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 11px;
        font-weight: 700;
        fill: #ffffff;
      }
    </style>
    <linearGradient id="logo-grad-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--color-primary)" stop-opacity="0.15" />
      <stop offset="100%" stop-color="var(--color-primary)" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="logo-grad-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--color-info)" stop-opacity="0.18" />
      <stop offset="100%" stop-color="var(--color-info)" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <g transform="translate(0 20)">
    <!-- back card: original -->
    <g transform="translate(20 30) rotate(-6)">
      <rect width="180" height="140" rx="14" class="bg-grad-a border-stroke" stroke-width="1.5" />
      <circle cx="44" cy="44" r="14" class="color-warning" opacity="0.6" />
      <path d="M0 110 L50 70 L90 95 L130 60 L180 100 L180 140 L0 140 Z" class="color-primary" opacity="0.25" />
      <rect x="12" y="118" width="60" height="14" rx="7" class="color-text-faint" opacity="0.5" />
      <g transform="translate(120 6)">
        <rect width="58" height="22" rx="11" class="color-danger" opacity="0.85" />
        <text x="29" y="15" text-anchor="middle" class="text-badge">2.4 MB</text>
      </g>
    </g>

    <!-- front card: compressed -->
    <g transform="translate(120 110) rotate(4)">
      <rect width="180" height="140" rx="14" class="bg-grad-b border-stroke" stroke-width="1.5" />
      <circle cx="44" cy="44" r="14" class="color-warning" opacity="0.7" />
      <path d="M0 110 L50 70 L90 95 L130 60 L180 100 L180 140 L0 140 Z" class="color-info" opacity="0.3" />
      <rect x="12" y="118" width="60" height="14" rx="7" class="color-text-faint" opacity="0.5" />
      <g transform="translate(124 6)">
        <rect width="54" height="22" rx="11" class="color-success" opacity="0.95" />
        <text x="27" y="15" text-anchor="middle" class="text-badge">412 KB</text>
      </g>
    </g>

    <!-- arrow between -->
    <g transform="translate(95 80)" opacity="0.65">
      <path d="M0 0 L24 24" class="stroke-primary" stroke-width="2" stroke-linecap="round" />
      <path d="M16 22 L24 24 L22 16" class="stroke-primary" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
  </g>
</svg>
