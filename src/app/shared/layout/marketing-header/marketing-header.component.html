<header class="marketing-header">
  <a [routerLink]="['/', lang()]" class="brand" [attr.aria-label]="t()['app_title']">
    <svg
      class="logo-icon"
      viewBox="0 0 320 320"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-hidden="true"
    >
      <defs>
        <linearGradient id="header-logo-grad-a" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="var(--color-primary)" stop-opacity="0.15" />
          <stop offset="100%" stop-color="var(--color-primary)" stop-opacity="0.05" />
        </linearGradient>
        <linearGradient id="header-logo-grad-b" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="var(--color-info)" stop-opacity="0.18" />
          <stop offset="100%" stop-color="var(--color-info)" stop-opacity="0.05" />
        </linearGradient>
      </defs>

      <g transform="translate(0 20)">
        <!-- back card: original -->
        <g transform="translate(20 30) rotate(-6)">
          <rect
            width="180"
            height="140"
            rx="14"
            fill="url(#header-logo-grad-a)"
            stroke="var(--color-border)"
            stroke-width="1.5"
          />
          <circle cx="44" cy="44" r="14" fill="var(--color-warning)" opacity="0.6" />
          <path
            d="M0 110 L50 70 L90 95 L130 60 L180 100 L180 140 L0 140 Z"
            fill="var(--color-primary)"
            opacity="0.25"
          />
          <rect
            x="12"
            y="118"
            width="60"
            height="14"
            rx="7"
            fill="var(--color-text-faint)"
            opacity="0.5"
          />
          <g transform="translate(120 6)">
            <rect width="58" height="22" rx="11" fill="var(--color-danger)" opacity="0.85" />
            <text
              x="29"
              y="15"
              text-anchor="middle"
              font-family="system-ui, sans-serif"
              font-size="11"
              font-weight="700"
              fill="#fff"
            >
              2.4 MB
            </text>
          </g>
        </g>

        <!-- front card: compressed -->
        <g transform="translate(120 110) rotate(4)">
          <rect
            width="180"
            height="140"
            rx="14"
            fill="url(#header-logo-grad-b)"
            stroke="var(--color-border)"
            stroke-width="1.5"
          />
          <circle cx="44" cy="44" r="14" fill="var(--color-warning)" opacity="0.7" />
          <path
            d="M0 110 L50 70 L90 95 L130 60 L180 100 L180 140 L0 140 Z"
            fill="var(--color-info)"
            opacity="0.3"
          />
          <rect
            x="12"
            y="118"
            width="60"
            height="14"
            rx="7"
            fill="var(--color-text-faint)"
            opacity="0.5"
          />
          <g transform="translate(124 6)">
            <rect width="54" height="22" rx="11" fill="var(--color-success)" opacity="0.95" />
            <text
              x="27"
              y="15"
              text-anchor="middle"
              font-family="system-ui, sans-serif"
              font-size="11"
              font-weight="700"
              fill="#fff"
            >
              412 KB
            </text>
          </g>
        </g>

        <!-- arrow between -->
        <g transform="translate(95 80)" opacity="0.65">
          <path
            d="M0 0 L24 24"
            stroke="var(--color-primary)"
            stroke-width="2"
            stroke-linecap="round"
          />
          <path
            d="M16 22 L24 24 L22 16"
            stroke="var(--color-primary)"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
          />
        </g>
      </g>
    </svg>
    <span class="brand-text">Image Optimizer</span>
  </a>

  <nav class="primary-nav" [attr.aria-label]="t()['nav_landing']">
    <a [routerLink]="['/', lang(), 'blog']" routerLinkActive="active">{{ t()['nav_blog'] }}</a>
    <a [routerLink]="['/', lang(), 'about']" routerLinkActive="active">{{ t()['nav_about'] }}</a>
    <a [routerLink]="['/', lang(), 'changelog']" routerLinkActive="active">{{
      t()['nav_changelog']
    }}</a>
  </nav>

  <div class="actions">
    <app-theme-toggle></app-theme-toggle>
    <app-lang-switcher></app-lang-switcher>
    <a [routerLink]="['/', lang(), 'optimize']" class="cta">{{ t()['btn_open_app'] }}</a>
  </div>
</header>
