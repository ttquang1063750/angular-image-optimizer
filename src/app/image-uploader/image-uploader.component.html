<div class="uploader-container">
  <div class="control-header">
    <app-theme-toggle></app-theme-toggle>
    <app-lang-switcher></app-lang-switcher>
  </div>

  <app-settings-panel></app-settings-panel>

  @if (settingsChanged() && processedFiles().length > 0) {
    <div class="settings-warning-banner">
      <div class="warning-content">
        <span class="warning-icon">⚠️</span>
        <div class="warning-text">
          <p>
            <strong>{{ t()['warning_settings_changed'] }}</strong>
          </p>
          <p>{{ t()['warning_settings_desc'] }}</p>
        </div>
      </div>
      <button class="btn-apply-changes" (click)="recompressAll()" [disabled]="isCompressing()">
        @if (isCompressing()) {
          {{ t()['status_compressing'] }}
        } @else {
          {{ t()['btn_apply_changes'] }}
        }
      </button>
    </div>
  }

  <app-drop-zone (filesSelected)="onFilesSelected($event)"></app-drop-zone>

  @if (processedFiles().length > 0) {
    <div class="batch-actions">
      <div class="stats">
        {{ t()['done_count'] }}:
        <strong>{{ completedCount() }}/{{ processedFiles().length }}</strong>
      </div>
      <div class="buttons">
        <button class="btn-clear" (click)="clearAll()">{{ t()['btn_clear'] }}</button>
        <button class="btn-download" [disabled]="completedCount() === 0" (click)="downloadAll()">
          {{ t()['btn_download_zip'] }}
        </button>
      </div>
    </div>
  }

  <app-file-list></app-file-list>

  <app-comparison-modal></app-comparison-modal>
</div>
