<div class="naming-controls">
  <div class="input-with-label">
    <span class="sub-label">{{ t()['label_prefix'] }}</span>
    <input
      type="text"
      [value]="namePrefix()"
      (input)="updatePrefix($event)"
      placeholder="Ví dụ: san-pham-"
    />
  </div>

  <div class="input-with-label">
    <span class="sub-label">{{ t()['label_suffix'] }}</span>
    <input
      type="text"
      [value]="nameSuffix()"
      (input)="updateSuffix($event)"
      placeholder="Ví dụ: -min"
    />
  </div>

  <div class="checkbox-group">
    <label class="checkbox-label">
      <input type="checkbox" [checked]="includeNumbering()" (change)="toggleNumbering()" />
      {{ t()['label_numbering'] }}
    </label>
    @if (includeNumbering()) {
      <div class="field">
        <div class="numbering-input" [class.has-error]="errorFor('startIndex')">
          <span class="sub-label">{{ t()['label_start_index'] }}</span>
          <input
            type="number"
            [value]="startNumberingIndex()"
            (input)="updateStartIndex($event)"
            [min]="ranges.startNumberingIndex.min"
            [max]="ranges.startNumberingIndex.max"
          />
        </div>
        @if (errorFor('startIndex'); as msg) {
          <span class="field-error">{{ msg }}</span>
        }
      </div>
    }
  </div>
</div>
