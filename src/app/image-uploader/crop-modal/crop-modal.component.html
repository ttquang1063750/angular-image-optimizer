<div class="crop-dialog" role="dialog" [attr.aria-label]="t()['modal_crop_title']">
  <div class="dialog-header">
    <h3>{{ t()['modal_crop_title'] }} {{ data.file.file.name }}</h3>
    <button class="btn-close" (click)="close()" aria-label="Close dialog">✕</button>
  </div>

  <div class="dialog-body">
    <div class="cropper-wrapper">
      <img #imageElement [src]="imageUrl" alt="Crop preview" />
    </div>
  </div>

  <div class="dialog-toolbar">
    <div class="toolbar-group aspect-ratios">
      <button
        type="button"
        [class.active]="isNaN(currentAspectRatio)"
        (click)="setAspectRatio(NaN)"
      >
        {{ t()['crop_aspect_free'] }}
      </button>
      <button type="button" [class.active]="currentAspectRatio === 1" (click)="setAspectRatio(1)">
        {{ t()['crop_aspect_1_1'] }}
      </button>
      <button
        type="button"
        [class.active]="currentAspectRatio === 4 / 3"
        (click)="setAspectRatio(4 / 3)"
      >
        {{ t()['crop_aspect_4_3'] }}
      </button>
      <button
        type="button"
        [class.active]="currentAspectRatio === 16 / 9"
        (click)="setAspectRatio(16 / 9)"
      >
        {{ t()['crop_aspect_16_9'] }}
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group transformation">
      <button type="button" (click)="rotate(-90)" title="Rotate Left">↩️</button>
      <button type="button" (click)="rotate(90)" title="Rotate Right">↪️</button>
      <button type="button" (click)="flip('x')" title="Flip Horizontal">↔️</button>
      <button type="button" (click)="flip('y')" title="Flip Vertical">↕️</button>
    </div>
  </div>

  <div class="dialog-footer">
    <button type="button" class="btn-cancel" (click)="close()">
      {{ t()['btn_cancel'] }}
    </button>
    <button type="button" class="btn-apply" (click)="apply()">
      {{ t()['btn_crop_confirm'] }}
    </button>
  </div>
</div>
