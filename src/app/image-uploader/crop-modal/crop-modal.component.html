<div class="crop-dialog" role="dialog" [attr.aria-label]="t()['modal_crop_title']">
  <div class="dialog-header">
    <h3>{{ t()['modal_crop_title'] }} {{ data.file.file.name }}</h3>
    <button
      type="button"
      class="btn-close"
      (click)="close()"
      [attr.aria-label]="t()['btn_close']"
      [title]="t()['btn_close']"
    >
      ✕
    </button>
  </div>

  @if (isLoading()) {
    <div class="cropper-loading-overlay">
      <span class="spinner"></span>
    </div>
  }

  @if (loadError(); as err) {
    <div class="dialog-error" role="alert">
      <p>{{ err }}</p>
    </div>
  } @else {
    <div class="dialog-body">
      <div class="cropper-wrapper">
        <img #imageElement [src]="imageUrl" [alt]="t()['crop_preview_alt']" />
      </div>
    </div>

    <div class="dialog-toolbar">
      <div class="toolbar-group aspect-ratios">
        <button type="button" [class.active]="currentMode() === 'free'" (click)="setMode('free')">
          {{ t()['crop_aspect_free'] }}
        </button>
        <button type="button" [class.active]="currentMode() === '1:1'" (click)="setMode('1:1')">
          {{ t()['crop_aspect_1_1'] }}
        </button>
        <button type="button" [class.active]="currentMode() === '4:3'" (click)="setMode('4:3')">
          {{ t()['crop_aspect_4_3'] }}
        </button>
        <button type="button" [class.active]="currentMode() === '16:9'" (click)="setMode('16:9')">
          {{ t()['crop_aspect_16_9'] }}
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <div class="toolbar-group transformation">
        <button
          type="button"
          (click)="rotate(-90)"
          [attr.aria-label]="t()['btn_rotate_left']"
          [title]="t()['btn_rotate_left']"
        >
          ↩️
        </button>
        <button
          type="button"
          (click)="rotate(90)"
          [attr.aria-label]="t()['btn_rotate_right']"
          [title]="t()['btn_rotate_right']"
        >
          ↪️
        </button>
        <button
          type="button"
          (click)="flip('x')"
          [attr.aria-label]="t()['btn_flip_h']"
          [title]="t()['btn_flip_h']"
        >
          ↔️
        </button>
        <button
          type="button"
          (click)="flip('y')"
          [attr.aria-label]="t()['btn_flip_v']"
          [title]="t()['btn_flip_v']"
        >
          ↕️
        </button>
      </div>
    </div>
  }

  <div class="dialog-footer">
    <button type="button" class="btn-cancel" (click)="close()">
      {{ t()['btn_cancel'] }}
    </button>
    @if (!loadError()) {
      <button type="button" class="btn-apply" (click)="apply()" [disabled]="!canApply()">
        {{ t()['btn_crop_confirm'] }}
      </button>
    }
  </div>
</div>
